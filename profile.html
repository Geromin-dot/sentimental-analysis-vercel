<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFocus | Profile</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="app-container wide">
        <header>
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
                    <circle cx="12" cy="12" r="4" fill="currentColor"/>
                    <line x1="12" y1="2" x2="12" y2="6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <line x1="12" y1="18" x2="12" y2="22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <line x1="2" y1="12" x2="6" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <line x1="18" y1="12" x2="22" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
                <h1><span class="logo-accent">i</span>Focus</h1>
            </div>
            
            <nav class="nav-links">
                <a href="command-center.html">Home</a>
                <a href="index.html">Flashcards</a>
                <a href="analytics.html">Analytics</a>
                <a href="coach.html">AI Coach</a>
            </nav>

            <div class="sidebar-bottom">
                <a href="profile.html" class="sidebar-action active">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    Profile
                </a>
                <a href="settings.html" class="sidebar-action">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                    Settings
                </a>
                <a href="#" class="sidebar-action logout">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    Log Out
                </a>
            </div>
        </header>

        <main class="page-layout" style="display: flex; justify-content: center; align-items: flex-start; padding: 2rem;">
            <div class="glass-panel profile-container" style="max-width: 600px; width: 100%;">
                <div class="profile-header" style="margin-bottom: 2rem;">
                    <h2 style="color: var(--primary-accent);">Profile</h2>
                </div>
                <div class="profile-content" style="display: flex; flex-direction: column; align-items: center;">
                    <div class="avatar-wrapper" style="position: relative; margin-bottom: 1rem;">
                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Alex&backgroundColor=c0aede" alt="Avatar" class="profile-avatar" style="width: 120px; height: 120px; border-radius: 50%; border: 4px solid white; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
                        <button class="edit-avatar-btn" style="position: absolute; bottom: 0; right: 0; background: var(--primary-accent); color: white; border: none; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.2);">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
                        </button>
                    </div>
                    <h3 class="profile-name" style="font-size: 1.5rem; color: var(--text-primary); margin-bottom: 2rem;">Alex Johnson</h3>
                    
                    <div class="profile-stats-grid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; width: 100%; border-top: 1px solid var(--glass-border); padding-top: 2rem;">
                        <div class="profile-stat-box" style="text-align: center; padding: 1rem; background: rgba(0,0,0,0.02); border-radius: 12px;">
                            <span class="stat-value" style="display: block; font-size: 1.8rem; font-weight: 700; color: var(--primary-accent);">124</span>
                            <span class="stat-label" style="font-size: 0.85rem; color: var(--text-secondary);">Total Sessions</span>
                        </div>
                        <div class="profile-stat-box" style="text-align: center; padding: 1rem; background: rgba(0,0,0,0.02); border-radius: 12px;">
                            <span class="stat-value" style="display: block; font-size: 1.8rem; font-weight: 700; color: var(--primary-accent);">42h</span>
                            <span class="stat-label" style="font-size: 0.85rem; color: var(--text-secondary);">Focus Time</span>
                        </div>
                        <div class="profile-stat-box" style="text-align: center; padding: 1rem; background: rgba(0,0,0,0.02); border-radius: 12px;">
                            <span class="stat-value" style="display: block; font-size: 1.8rem; font-weight: 700; color: var(--primary-accent);">15</span>
                            <span class="stat-label" style="font-size: 0.85rem; color: var(--text-secondary);">Day Streak</span>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="global-timer.js?v=2"></script>
</body>
</html>
