<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Study AI | Focus & Sentiment</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .sentiment-container {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 2rem;
            width: 100%;
        }
        @media (max-width: 768px) {
            .sentiment-container {
                grid-template-columns: 1fr;
            }
        }
        
        .task-list {
            margin-top: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .task-item {
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--glass-border);
            padding: 1.25rem;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.4s ease;
        }
        .task-item.high-effort {
            border-left: 4px solid var(--error);
        }
        .task-item.medium-effort {
            border-left: 4px solid #f59e0b;
        }
        .task-item.quick-win {
            border-left: 4px solid var(--success);
        }
        
        .intervention-card {
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid var(--primary-accent);
            padding: 1.5rem;
            border-radius: 12px;
            margin-top: 1.5rem;
            animation: fadeIn 0.5s ease;
        }
        
        .state-badge {
            display: inline-block;
            padding: 0.35rem 1rem;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }
        .state-Stressed { background: rgba(239, 68, 68, 0.2); color: #fca5a5; }
        .state-Distracted { background: rgba(245, 158, 11, 0.2); color: #fcd34d; }
        .state-Engaged { background: rgba(16, 185, 129, 0.2); color: #6ee7b7; }
        .state-Motivated { background: rgba(99, 102, 241, 0.2); color: #a5b4fc; }
    </style>
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="app-container" style="max-width: 1000px;">
        <header>
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M4 19V5C4 3.89543 4.89543 3 6 3H19.4C19.8319 3 20.1066 3.44754 19.9238 3.8443L18 8L19.9238 12.1557C20.1066 12.5525 19.8319 13 19.4 13H6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M6 13V21" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <h1>Smart Study AI</h1>
            </div>
            <nav class="nav-links">
                <a href="index.html">Flashcards</a>
                <a href="sentiment.html" class="active">Focus & Sentiment</a>
                <a href="coach.html">AI Coach</a>
            </nav>
            <div class="settings">
                <!-- Keep settings space empty for layout balance -->
                <div style="width:44px;"></div>
            </div>
        </header>

        <main class="sentiment-container">
            <div class="left-col" style="display: flex; flex-direction: column; gap: 2rem;">
                <div class="glass-panel">
                    <h2>How are you feeling?</h2>
                    <p class="subtitle" style="margin-bottom: 1.5rem;">Log your current thoughts, stress levels, or focus struggles.</p>
                    <textarea id="reflectionInput" placeholder="E.g., I have so much to read for biology and I keep getting distracted by my phone. It's overwhelming..." style="height: 150px; margin-bottom: 1.5rem;"></textarea>
                    
                    <button id="analyzeBtn" class="btn-primary" style="margin-top: 0;">
                        <span class="btn-text">Analyze Sentiment & Adjust</span>
                        <svg class="sparkle" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v18"></path><path d="M3 12h18"></path><path d="M19 5l-14 14"></path><path d="M5 5l14 14"></path></svg>
                    </button>
                </div>

                <div class="glass-panel hidden" id="interventionSection">
                    <h2>AI Intervention</h2>
                    <div id="interventionContent" class="intervention-card">
                        <!-- Filled by JS -->
                    </div>
                </div>
            </div>

            <div class="right-col">
                <div class="glass-panel" style="margin-bottom: 2rem; text-align: center;">
                    <h2 id="timerDisplay" style="font-size: 3.5rem; font-weight: 700; color: var(--primary-accent); font-variant-numeric: tabular-nums; letter-spacing: 2px;">25:00</h2>
                    <p id="timerLabel" class="subtitle" style="margin-bottom: 1.5rem; color: var(--text-primary);">Focus Time</p>
                    
                    <div style="display: flex; justify-content: center; gap: 1rem;">
                        <button id="startTimerBtn" class="btn-primary" style="width: auto; padding: 0.75rem 2.5rem; margin-top: 0; font-size: 1.1rem;">Start</button>
                        <button id="resetTimerBtn" class="btn-secondary" style="padding: 0.75rem 1.5rem;">Reset</button>
                    </div>
                </div>

                <div class="glass-panel">
                    <h2>Today's Tasks</h2>
                    <p class="subtitle" style="margin-bottom: 0.5rem;">Your task list adapts to your emotional state.</p>
                    
                    <div class="task-list" id="taskList">
                        <!-- Filled by JS -->
                    </div>

                    <div style="display: flex; gap: 0.5rem; margin-top: 1.5rem;">
                        <input type="text" id="newTaskInput" placeholder="Add a new task..." style="flex: 1; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); border-radius: 8px; padding: 0.75rem 1rem; color: white;">
                        <select id="newTaskEffort" style="background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); border-radius: 8px; padding: 0.75rem; color: white; outline: none; cursor: pointer;">
                            <option value="Low (Quick Win)" style="background: var(--bg-color);">Low</option>
                            <option value="Medium" style="background: var(--bg-color);">Medium</option>
                            <option value="High" style="background: var(--bg-color);">High</option>
                        </select>
                        <button id="addTaskBtn" class="btn-secondary" style="padding: 0.75rem 1.5rem; background: rgba(99, 102, 241, 0.2); border-color: var(--primary-accent); color: white;">Add</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="sentiment.js"></script>
</body>
</html>
